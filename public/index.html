<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>World Cup Pool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/styles.css?v=32" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <!-- Classic (non-module) error reporter: installs BEFORE the app module so any
       load/parse/runtime error shows on screen instead of a blank "Loading…". -->
  <script>
    (function () {
      var shown = false;
      function show(title, detail) {
        if (shown) return; shown = true;
        var app = document.getElementById('app');
        if (!app) return;
        app.innerHTML =
          '<div style="padding:24px 18px;color:#eef2ff;font-family:-apple-system,system-ui,sans-serif">' +
          '<div style="font-size:40px">⚠️</div>' +
          '<h2 style="margin:8px 0;color:#ff5470">' + title + '</h2>' +
          '<p style="color:#9fb0e8;font-size:13px;margin:0 0 10px">Screenshot this and send it over:</p>' +
          '<pre style="white-space:pre-wrap;word-break:break-word;background:#0e1640;border:1px solid #2d3f8f;' +
          'padding:12px;border-radius:10px;font-size:12px;color:#ffd54f;max-height:50vh;overflow:auto">' +
          String(detail || '').replace(/[<>&]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]; }) +
          '</pre>' +
          '<button onclick="location.reload(true)" style="margin-top:14px;padding:14px 20px;border:0;' +
          'border-radius:12px;background:#00e676;color:#04210f;font-weight:800;font-size:16px;width:100%">Reload</button>' +
          '<p style="color:#5a6aa0;font-size:11px;margin-top:14px">build v32 · ' + navigator.userAgent + '</p>' +
          '</div>';
      }
      window.addEventListener('error', function (e) {
        if (e && e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          show('Could not load a file', 'Failed to load: ' + (e.target.src || e.target.href));
        } else {
          show('Script error', (e.message || 'Unknown') +
            (e.filename ? ('\n' + e.filename + ':' + e.lineno + ':' + e.colno) : '') +
            (e.error && e.error.stack ? ('\n\n' + e.error.stack) : ''));
        }
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        show('Startup failed', (r && (r.stack || r.message)) || String(r) || 'unknown rejection');
      });
      // If nothing has rendered after a few seconds, surface that too.
      setTimeout(function () {
        var app = document.getElementById('app');
        if (app && /Loading…/.test(app.textContent || '')) {
          show('Stuck loading', 'The app script did not start. This is usually a stale cache — tap Reload. If it persists, screenshot this.');
        }
      }, 6000);
    })();
  </script>
</head>
<body>
  <div id="app"><div class="loading">Loading…</div></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js?v=32" type="module"></script>
</body>
</html>
