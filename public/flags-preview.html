<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1437" />
  <title>Flags — World Cup Pool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/styles.css?v=17" />
  <style>
    .pv-head { padding: 18px 2px 4px; }
    .pv-head h1 { font-size: 18px; margin: 0 0 6px; }
    .pv-head p { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
    .pv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding-bottom: 40px; }
    .pv-cell {
      text-align: center; font-size: 12px; cursor: pointer; color: var(--txt);
      opacity: 0; animation: fadeUp .45s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    .pv-cell:active .pv-flag { transform: scale(.95); }
    .pv-flag {
      aspect-ratio: 3 / 2; border-radius: 10px; overflow: hidden; margin-bottom: 6px;
      box-shadow: 0 6px 18px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.18);
      transition: transform .15s ease; background: rgba(0,0,0,.25);
    }
    .pv-flag svg { width: 100%; height: 100%; display: block; }
    .pv-cell .fl {
      animation: flagLayerIn .55s cubic-bezier(.2,.85,.3,1.2) both;
      transform-box: fill-box; transform-origin: center;
    }
    .pv-cell .nm { font-weight: 600; }
    .pv-cell .od { color: var(--muted); font-size: 11px; }
  </style>
  <script>
    (function () {
      var shown = false;
      function show(t, d) {
        if (shown) return; shown = true;
        document.body.innerHTML =
          '<div style="padding:24px 18px;color:#eef2ff;font-family:-apple-system,system-ui,sans-serif">' +
          '<div style="font-size:40px">⚠️</div><h2 style="color:#ff5470">' + t + '</h2>' +
          '<pre style="white-space:pre-wrap;word-break:break-word;background:#0e1640;border:1px solid #2d3f8f;padding:12px;border-radius:10px;font-size:12px;color:#ffd54f">' +
          String(d || '').replace(/[<>&]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]; }) + '</pre>' +
          '<button onclick="location.reload(true)" style="margin-top:14px;padding:14px;border:0;border-radius:12px;background:#00e676;color:#04210f;font-weight:800;width:100%">Reload</button>' +
          '<p style="color:#5a6aa0;font-size:11px;margin-top:12px">build v17 · ' + navigator.userAgent + '</p></div>';
      }
      window.addEventListener('error', function (e) {
        if (e && e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK'))
          show('Could not load a file', 'Failed: ' + (e.target.src || e.target.href));
        else show('Script error', (e.message || 'Unknown') + (e.filename ? ('\n' + e.filename + ':' + e.lineno) : '') + (e.error && e.error.stack ? '\n\n' + e.error.stack : ''));
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason; show('Failed', (r && (r.stack || r.message)) || String(r));
      });
    })();
  </script>
</head>
<body>
  <div id="app">
    <div class="pv-head">
      <h1>⚽ All 48 flag animations</h1>
      <p>Flags build in below. <b>Tap any flag</b> to play its full draw announcement.</p>
      <button id="play-random" class="secondary" style="margin-top:0">🎲 Play a random one</button>
    </div>
    <div class="pv-grid" id="grid"><div class="loading" style="text-align:center;color:var(--muted);padding:40px">Loading flags…</div></div>
  </div>
  <script type="module">
    import { flagSVG } from '/flags.js?v=17';
    import { playAnnouncement } from '/announce.js?v=17';

    async function start() {
      const grid = document.getElementById('grid');
      const teams = await fetch('/api/teams').then((r) => r.json()).then((d) => d.teams);

      grid.innerHTML = teams.map((t, i) =>
        `<div class="pv-cell" data-code="${t.code}" style="animation-delay:${i * 45}ms">
          <div class="pv-flag">${flagSVG(t.code, t)}</div>
          <div class="nm">${t.flag} ${t.name}</div>
          <div class="od">Tier ${t.tier} · ${t.odds}</div>
        </div>`
      ).join('');
      grid.querySelectorAll('.pv-cell').forEach((cell, i) => {
        cell.querySelectorAll('.fl').forEach((l) => {
          const base = parseFloat(l.style.animationDelay) || 0;
          l.style.animationDelay = `${i * 45 + base}ms`;
        });
      });

      const demo = (team) => playAnnouncement({
        team, roundLabel: `PREVIEW · TIER ${team.tier}`,
        coach: { name: 'You', teamName: 'Your Club FC' },
      });
      grid.addEventListener('click', (e) => {
        const cell = e.target.closest('.pv-cell');
        if (cell) demo(teams.find((t) => t.code === cell.dataset.code));
      });
      document.getElementById('play-random').addEventListener('click', () =>
        demo(teams[Math.floor(Math.random() * teams.length)]));
    }
    start();
  </script>
</body>
</html>
